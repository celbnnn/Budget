//═══════════════════════════ CHARGEMENT + MIGRATION ═══════════════════════════
var data;
(function load(){
  var v3 = store.get("budget-data-v3");
  if(v3){ try { data = JSON.parse(v3); } catch(e){ data = defaultData(); } }
  else {
    data = defaultData();
    var v2 = store.get("budget-data-v2");
    if(v2){
      try {
        var old = JSON.parse(v2);
        if(old.salary) data.incomes[0].amount = Number(old.salary)||0;
        if(old.currentMonth) data.currentMonth = old.currentMonth;
        if(old.objectives && old.objectives.length) data.objectives = old.objectives;
        if(old.archives) data.archives = old.archives;
        (old.categories||[]).forEach(function(oc){
          if(oc.type==="expense"){
            var nc = data.categories.filter(function(c){ return c.id===oc.id; })[0];
            if(nc && oc.items) nc.items = oc.items;
          }
        });
      } catch(e){}
    }
    store.set("budget-data-v3", JSON.stringify(data));
  }
  if(!data.categories) data.categories = [];
  if(!data.assets)     data.assets = [];
  if(!data.objectives) data.objectives = [];
  if(!data.archives)   data.archives = [];
  if(!data.theme)      data.theme = "#FF6B9D";
  // Migration : ancien format salary/otherIncome -> liste incomes
  if(!data.incomes){
    data.incomes = [];
    data.incomes.push({ id:uid(), label:"Salaire", icon:"💰", amount:(Number(data.salary)||0) });
    data.incomes.push({ id:uid(), label:"Autre revenu", icon:"➕", amount:(Number(data.otherIncome)||0) });
  }
  delete data.salary; delete data.otherIncome;
})();

function save(){ store.set("budget-data-v3", JSON.stringify(data)); }

//═══════════════════════════ ÉTAT UI ═══════════════════════════
var state = { tab:"overview", ringView:"expense", modal:null, viewArchive:null, toast:null };
var modalDraft = {};

//═══════════════════════════ HELPERS ═══════════════════════════
function fmt(n, dec){ n = Number(n)||0; return n.toLocaleString("fr-FR", { maximumFractionDigits: (dec===undefined?0:dec) }); }
function income(){ return (data.incomes||[]).reduce(function(s,r){ return s + (Number(r.amount)||0); }, 0); }
function pct(part){ return Math.round(part / (income()||1) * 100); }
function findCat(id){ return data.categories.filter(function(c){ return c.id===id; })[0]; }
function findItem(cat, id){ return cat.items.filter(function(i){ return i.id===id; })[0]; }
function findAsset(id){ return data.assets.filter(function(a){ return a.id===id; })[0]; }
function idxById(arr, id){ for(var k=0;k<arr.length;k++){ if(arr[k].id===id) return k; } return -1; }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function th(){ return data.theme || "#FF6B9D"; }
function hexToRgba(hex, a){
  hex = (hex||"#FF6B9D").replace("#","");
  if(hex.length===3) hex = hex.split("").map(function(c){ return c+c; }).join("");
  var r=parseInt(hex.slice(0,2),16), g=parseInt(hex.slice(2,4),16), b=parseInt(hex.slice(4,6),16);
  return "rgba("+r+","+g+","+b+","+a+")";
}
function totals(){
  var dep=0, sav=0;
  data.categories.forEach(function(c){
    var sum = c.items.reduce(function(s,i){ return s + (Number(i.amount)||0); }, 0);
    if(c.type==="savings") sav += sum; else dep += sum;
  });
  return { dep:dep, sav:sav, out:dep+sav, rest:income() - (dep+sav) };
}
function catTotal(c){ return c.items.reduce(function(s,i){ return s + (Number(i.amount)||0); }, 0); }
function assetsTotal(){ return data.assets.reduce(function(s,a){ return s + (Number(a.value)||0); }, 0); }
function daysUntil(dateStr){
  if(!dateStr) return null;
  var d = new Date(dateStr + "T23:59:59"); if(isNaN(d)) return null;
  return Math.ceil((d - new Date()) / 86400000);
}
function fmtDate(dateStr){
  if(!dateStr) return "";
  var d = new Date(dateStr + "T12:00:00"); if(isNaN(d)) return "";
  return d.getDate() + " " + MONTHS_SHORT[d.getMonth()] + " " + d.getFullYear();
}
var CARD = "background:rgba(255,255,255,0.03);border-radius:16px;border:1px solid rgba(255,255,255,0.07);";

//═══════════════════════════ ANNEAU (SVG) ═══════════════════════════
function prepSegments(rawSegments){
  var valid = rawSegments.filter(function(s){ return (s.value||0) > 0; }).slice().sort(function(a,b){ return b.value-a.value; });
  var sum = valid.reduce(function(s,x){ return s+x.value; }, 0) || 1;
  var minFrac = 0.045, maxKeep = 9;
  var kept = [], other = 0;
  valid.forEach(function(s, idx){
    if(idx < maxKeep && (s.value/sum) >= minFrac){ kept.push({ label:s.label, value:s.value, color:s.color }); }
    else { other += s.value; }
  });
  if(other > 0.0001){ kept.push({ label:"Autres", value:other, color:"#8A94A6" }); }
  return kept;
}
function donut(rawSegments, centerMain, centerSub, emptyMsg){
  var size=230, stroke=15, gap=9, r=(size-stroke)/2-6, cx=size/2, cy=size/2, circ=2*Math.PI*r;
  var segs = prepSegments(rawSegments);
  var sum = segs.reduce(function(s,x){ return s+x.value; }, 0);
  var track = '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="rgba(255,255,255,0.055)" stroke-width="'+stroke+'"/>';
  var arcs = "";
  if(sum > 0){
    var pos = 0;                       // longueur d'arc depuis le sommet, sens horaire
    var multi = segs.length > 1;
    segs.forEach(function(seg){
      var sliceLen = seg.value/sum*circ;
      var g = multi ? gap : 0;
      var dashLen = sliceLen - g - stroke;            // le bout arrondi ajoute stroke/2 de chaque côté
      if(dashLen < 0.5) dashLen = 0.5;
      var startArc = pos + g/2 + stroke/2;            // début géométrique du trait
      var rotDeg = -90 + (startArc/circ)*360;
      arcs += '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+seg.color+'" stroke-width="'+stroke
            + '" stroke-linecap="round" stroke-dasharray="'+dashLen+' '+(circ-dashLen)+'" transform="rotate('+rotDeg+' '+cx+' '+cy+')"/>';
      pos += sliceLen;
    });
  }
  var center = '<text x="'+cx+'" y="'+(cy-2)+'" text-anchor="middle" fill="#F1F5F9" font-size="34" font-weight="800" font-family="ui-monospace,monospace">'+centerMain+'</text>'
             + '<text x="'+cx+'" y="'+(cy+22)+'" text-anchor="middle" fill="#64748B" font-size="11" letter-spacing="2" font-weight="600">'+esc(centerSub)+'</text>';
  if(sum<=0 && emptyMsg){
    return '<svg viewBox="0 0 '+size+' '+size+'" style="width:100%;max-width:230px;display:block;margin:0 auto;">'+track
        + '<text x="'+cx+'" y="'+cy+'" text-anchor="middle" fill="#475569" font-size="12">'+esc(emptyMsg)+'</text></svg>';
  }
  return '<svg viewBox="0 0 '+size+' '+size+'" style="width:100%;max-width:230px;display:block;margin:0 auto;">'+track+arcs+center+'</svg>';
}
function legendHTML(rawSegments){
  var valid = prepSegments(rawSegments);
  var sum = valid.reduce(function(s,x){ return s+x.value; }, 0) || 1;
  if(valid.length===0) return "";
  var html = '<div style="display:flex;flex-wrap:wrap;gap:6px 10px;margin-top:14px;justify-content:center;">';
  valid.forEach(function(s){
    html += '<div style="display:flex;align-items:center;gap:6px;">'
          + '<span style="width:9px;height:9px;border-radius:3px;background:'+s.color+';display:inline-block;"></span>'
          + '<span style="color:#94A3B8;font-size:11px;">'+esc(s.label)+'</span>'
          + '<span style="color:#CBD5E1;font-size:11px;font-weight:700;font-family:ui-monospace,monospace;">'+fmt(s.value)+'€</span>'
          + '<span style="color:#475569;font-size:10px;">'+Math.round(s.value/sum*100)+'%</span></div>';
  });
  return html + '</div>';
}
function ringSegments(type){
  var segs = [], idx = 0;
  data.categories.forEach(function(c){
    if((type==="savings") !== (c.type==="savings")) return;
    c.items.forEach(function(i){ segs.push({ label:i.label, value:Number(i.amount)||0, color:PALETTE[idx % PALETTE.length] }); idx++; });
  });
  return segs;
}

       +     '<button class="tap" data-action="open-theme" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:10px;width:38px;height:36px;font-size:16px;cursor:pointer;">🎨</button>'

       +   '</div>'

       + '<input data-input="month" value="'+esc(data.currentMonth)+'" style="background:transparent;border:none;outline:none;color:'+th()+';font-size:24px;font-weight:800;letter-spacing:-0.5px;padding:0;width:100%;margin-bottom:10px;">'
       + '<div style="'+CARD+'padding:12px 14px;">'
       +   rows

       +   '<div style="display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(255,255,255,0.08);padding-top:9px;margin-top:4px;">'
       +     '<span style="color:#CBD5E1;font-size:13px;font-weight:600;">Revenu total</span>'
       +     '<span style="color:'+th()+';font-weight:800;font-size:19px;font-family:ui-monospace,monospace;">'+fmt(income())+'€</span>'
       +   '</div>'
       + '</div>'
       + '</div>';
}

function slimBarHTML(t){
  var sal = income()||1;
  function seg(val,color){ return '<div style="flex:'+Math.max(0,Math.round(val/sal*100))+';background:'+color+';height:100%;min-width:'+(val>0?3:0)+'px;"></div>'; }
  return '<div style="height:8px;border-radius:8px;overflow:hidden;display:flex;margin-bottom:6px;background:#1E2530;">'
       +   seg(t.dep,"#FF6B9D") + seg(t.sav,"#34D399")
       +   '<div style="flex:'+Math.max(0,Math.round(t.rest/sal*100))+';background:#1E2530;"></div></div>'
       + '<div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:18px;">'
       +   '<span style="color:#FF6B9D;">Dépenses '+pct(t.dep)+'%</span>'
       +   '<span style="color:#34D399;">Épargne '+pct(t.sav)+'%</span>'
       +   '<span style="color:'+(t.rest>=0?"#60A5FA":"#F87171")+';">Reste '+Math.max(0,pct(t.rest))+'%</span></div>';
}

function kpiHTML(t){
  var cards = [
    { label:"Dépenses",     value:fmt(t.dep)+"€",  color:"#FF6B9D", icon:"💸" },
    { label:"Épargné/mois", value:fmt(t.sav)+"€",  color:"#34D399", icon:"💰" },
    { label:"Reste",        value:fmt(t.rest)+"€", color:(t.rest>=0?"#60A5FA":"#F87171"), icon:(t.rest>=0?"✅":"⚠️") },
    { label:"Taux épargne", value:pct(t.sav)+"%",  color:"#A78BFA", icon:"📈" }
  ];
  var html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:18px;">';
  cards.forEach(function(k){
    html += '<div style="'+CARD+'padding:11px 13px;border-color:'+k.color+'20;">'

          + '<div style="color:#64748B;font-size:11px;margin-top:1px;">'+k.label+'</div></div>';
  });
  return html + '</div>';
}

function ringSectionHTML(t){
  var isSav = state.ringView==="savings";
  var segs = ringSegments(isSav?"savings":"expense");
  function tab(view,label){
    var on = state.ringView===view;
    return '<button class="tap" data-action="ring" data-view="'+view+'" style="flex:1;padding:7px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;'

       +     '<span style="font-size:17px;">'+(i.icon||"•")+'</span>'

       + '</div>'

var app = document.getElementById("app");
function render(){
  var t = totals();
  app.innerHTML = '<div style="min-height:100vh;padding:max(2px,calc(env(safe-area-inset-top) - 28px)) 16px 60px;max-width:480px;margin:0 auto;">'
    + (state.modal ? modalHTML() : "") + (state.toast ? toastHTML() : "")

  if(state.modal) attachSwipeDismiss();
}

// Permet de faire glisser la feuille modale vers le bas pour la fermer
function attachSwipeDismiss(){
  var sheet = app.querySelector("[data-modal-sheet]");
  if(!sheet) return;
  var startY = 0, curY = 0, dragging = false;
  sheet.addEventListener("touchstart", function(e){
    // On ne démarre le glissement que si le haut de la feuille est visible (pas en plein scroll interne)
    if(sheet.scrollTop > 0) return;
    startY = e.touches[0].clientY; curY = startY; dragging = true;
    sheet.style.transition = "none";
  }, { passive:true });
  sheet.addEventListener("touchmove", function(e){
    if(!dragging) return;
    curY = e.touches[0].clientY;
    var dy = curY - startY;
    if(dy > 0){ sheet.style.transform = "translateY("+dy+"px)"; }
  }, { passive:true });
  sheet.addEventListener("touchend", function(){
    if(!dragging) return;
    dragging = false;
    var dy = curY - startY;
    if(dy > 90){ // seuil de fermeture
      sheet.style.transition = "transform .2s ease";
      sheet.style.transform = "translateY(100%)";
      setTimeout(function(){ state.modal = null; render(); }, 180);
    } else {
      sheet.style.transition = "transform .2s ease";
      sheet.style.transform = "translateY(0)";
    }
  });
}
function showToast(msg, type){ state.toast = { msg:msg, type:type||"success" }; render(); setTimeout(function(){ state.toast = null; render(); }, 2400); }

//═══════════════════════════ ACTIONS ═══════════════════════════
function val(id){ var e=document.getElementById(id); return e ? e.value.trim() : ""; }
function num(id){ return parseFloat((val(id)||"").replace(/\s/g,"").replace(",",".").replace(/[^0-9.\-]/g,"")) || 0; }

function moveItem(catId, itemId, dir){
  var c=findCat(catId), i=idxById(c.items,itemId), j=i+dir;
  if(j<0||j>=c.items.length) return;
  var tmp=c.items[i]; c.items[i]=c.items[j]; c.items[j]=tmp; save(); render();
}
function moveAsset(id, dir){
  var i=idxById(data.assets,id), j=i+dir;
  if(j<0||j>=data.assets.length) return;
  var tmp=data.assets[i]; data.assets[i]=data.assets[j]; data.assets[j]=tmp; save(); render();
}

function nextMonthLabel(label){
  // Cherche "Mois AAAA" et renvoie le mois suivant. Si non reconnu, renvoie tel quel.
  var parts = String(label||"").trim().split(/\s+/);
  var mi = -1;
  for(var k=0;k<MONTHS.length;k++){ if(parts[0] && parts[0].toLowerCase()===MONTHS[k].toLowerCase()){ mi=k; break; } }
  var year = parseInt(parts[1]);
  if(mi<0 || isNaN(year)) return label;
  mi += 1; if(mi>11){ mi=0; year+=1; }
  return MONTHS[mi] + " " + year;
}

function doArchive(){
  var t = totals();
  var snapshot = data.categories.map(function(c){
    return { name:c.name, icon:c.icon, color:c.color, type:c.type, total:catTotal(c),
             items:c.items.map(function(i){ return { label:i.label, icon:i.icon, amount:Number(i.amount)||0 }; }) };
  });
  var snap = { month:data.currentMonth, income:income(),
    incomes:(data.incomes||[]).map(function(r){ return { label:r.label, icon:r.icon, amount:Number(r.amount)||0 }; }),
    dep:t.dep, sav:t.sav, out:t.out, rest:t.rest, snapshot:snapshot, archivedAt:new Date().toISOString() };
  var ex = data.archives.filter(function(a){ return a.month===data.currentMonth; })[0];
  if(ex){ data.archives = data.archives.map(function(a){ return a.month===data.currentMonth ? snap : a; }); }
  else { data.archives = data.archives.concat([snap]); }
  var archived = data.currentMonth;
  data.currentMonth = nextMonthLabel(data.currentMonth); // passe au mois suivant (modifiable à la main)
  save(); state.modal = null; showToast("✅ "+archived+" archivé → "+data.currentMonth);
}

function saveModal(){
  var m = state.modal; if(!m) return;
  if(m.kind==="item"){
    var cat = findCat(m.catId);
    var it = m.isNew ? { id:uid() } : findItem(cat, m.itemId);
    it.icon = val("m-icon") || "•"; it.label = val("m-label") || "Sans nom"; it.amount = num("m-amount");
    if(cat.type==="savings"){ it.hasGoal = !!modalDraft.hasGoal; it.goal = num("m-goal"); it.saved = num("m-saved"); it.goalDate = val("m-date"); }
    if(m.isNew) cat.items.push(it);
  } else if(m.kind==="category"){
    var c = m.isNew ? { id:uid(), items:[], collapsed:false, type:(m.cattype||"expense") } : findCat(m.catId);
    c.name = val("m-cat-name") || "Catégorie"; c.icon = val("m-cat-icon") || "📁"; c.color = modalDraft.color || c.color || COLORS[0];
    if(m.isNew) data.categories.push(c);
  } else if(m.kind==="asset"){
    var a = m.isNew ? { id:uid() } : findAsset(m.assetId);
    a.icon = val("m-asset-icon") || "💼"; a.label = val("m-asset-name") || "Actif"; a.value = num("m-asset-value");
    if(m.isNew) data.assets.push(a);
  } else if(m.kind==="income"){
    var r = m.isNew ? { id:uid() } : (data.incomes.filter(function(x){ return x.id===m.incomeId; })[0]);
    if(r){ r.icon = val("m-inc-icon") || "💰"; r.label = val("m-inc-name") || "Revenu"; r.amount = num("m-inc-amount"); if(m.isNew) data.incomes.push(r); }
  } else if(m.kind==="objective"){
    var txt = val("m-obj") || "Objectif";
    if(m.isNew) data.objectives.push(txt); else data.objectives[m.idx] = txt;
  }
  save(); state.modal = null; render();
}
function deleteModal(){
  var m = state.modal; if(!m) return;
  if(m.kind==="item"){ var cat=findCat(m.catId); cat.items = cat.items.filter(function(i){ return i.id!==m.itemId; }); }
  else if(m.kind==="category"){ data.categories = data.categories.filter(function(c){ return c.id!==m.catId; }); }
  else if(m.kind==="asset"){ data.assets = data.assets.filter(function(a){ return a.id!==m.assetId; }); }
  else if(m.kind==="income"){ if(data.incomes.length>1){ data.incomes = data.incomes.filter(function(r){ return r.id!==m.incomeId; }); } }
  else if(m.kind==="objective"){ data.objectives.splice(m.idx, 1); }
  save(); state.modal = null; render();
}

//═══════════════════════════ ÉVÉNEMENTS ═══════════════════════════
app.addEventListener("change", function(e){
  var d = e.target.dataset;
  if(d.input==="month"){ data.currentMonth = e.target.value.trim() || data.currentMonth; save(); }
});

app.addEventListener("click", function(e){
  // Fermeture de la modale : uniquement si le clic touche le fond noir lui-même,
  // pas la feuille (data-modal-sheet) ni aucun élément qu'elle contient.
  if(e.target.dataset && e.target.dataset.action === "modal-backdrop"){
    state.modal = null; render(); return;
  }

  var node = e.target.closest("[data-action]");
  if(!node) return;
  var a = node.dataset.action;

  // — Sélections en modale : PAS de re-render —
  if(a==="pick-emoji"){ var tgt=document.getElementById(node.dataset.target); if(tgt) tgt.value=node.dataset.emoji; return; }
  if(a==="pick-color"){ modalDraft.color=node.dataset.color; document.querySelectorAll("[data-swatch]").forEach(function(s){ s.style.outline="2px solid transparent"; }); node.style.outline="2px solid #fff"; return; }
  if(a==="toggle-goal"){
    modalDraft.hasGoal = !modalDraft.hasGoal;
    var tr=document.getElementById("goal-track"), kn=document.getElementById("goal-knob"), gf=document.getElementById("goal-fields");
    if(tr) tr.style.background = modalDraft.hasGoal?"#34D399":"rgba(255,255,255,0.15)";
    if(kn) kn.style.left = modalDraft.hasGoal?"21px":"2px";
    if(gf) gf.style.display = modalDraft.hasGoal?"block":"none";
    return;
  }
  if(a==="quick-add"){ var inp=document.getElementById("m-add"); if(inp){ inp.value=(parseFloat((inp.value||"0").replace(",",".").replace(/[^0-9.]/g,""))||0)+parseFloat(node.dataset.val); } return; }

  // — Thème : live —
  if(a==="pick-theme"){ data.theme = node.dataset.color; save(); render(); return; }

  // — Navigation —
  if(a==="tab"){ state.tab=node.dataset.tab; render(); return; }
  if(a==="ring"){ state.ringView=node.dataset.view; render(); return; }
  if(a==="toggle-cat"){ var c=findCat(node.dataset.cat); c.collapsed=!c.collapsed; save(); render(); return; }
  if(a==="view-archive"){ state.viewArchive=(state.viewArchive===node.dataset.month)?null:node.dataset.month; render(); return; }

  // — Réordonnancement —
  if(a==="item-up"){ moveItem(node.dataset.cat, node.dataset.item, -1); return; }
  if(a==="item-down"){ moveItem(node.dataset.cat, node.dataset.item, 1); return; }
  if(a==="asset-up"){ moveAsset(node.dataset.asset, -1); return; }
  if(a==="asset-down"){ moveAsset(node.dataset.asset, 1); return; }

  // — Ouvertures de modales —
  if(a==="open-archive"){ state.modal={kind:"archive"}; render(); return; }
  if(a==="open-theme"){ state.modal={kind:"theme"}; render(); return; }
  if(a==="edit-item"){ var ci=findItem(findCat(node.dataset.cat),node.dataset.item); modalDraft={hasGoal:!!(ci&&ci.hasGoal)}; state.modal={kind:"item",catId:node.dataset.cat,itemId:node.dataset.item,isNew:false}; render(); return; }
  if(a==="add-item"){ modalDraft={hasGoal:false}; state.modal={kind:"item",catId:node.dataset.cat,isNew:true}; render(); return; }
  if(a==="edit-cat"){ var cc=findCat(node.dataset.cat); modalDraft={color:cc.color}; state.modal={kind:"category",catId:cc.id,isNew:false}; render(); return; }
  if(a==="add-cat"){ modalDraft={color:COLORS[Math.floor(Math.random()*COLORS.length)]}; state.modal={kind:"category",isNew:true,cattype:node.dataset.cattype||"expense"}; render(); return; }
  if(a==="edit-asset"){ modalDraft={}; state.modal={kind:"asset",assetId:node.dataset.asset,isNew:false}; render(); return; }
  if(a==="add-asset"){ modalDraft={}; state.modal={kind:"asset",isNew:true}; render(); return; }
  if(a==="edit-income"){ modalDraft={}; state.modal={kind:"income",incomeId:node.dataset.income,isNew:false}; render(); return; }
  if(a==="add-income"){ modalDraft={}; state.modal={kind:"income",isNew:true}; render(); return; }
  if(a==="edit-obj"){ state.modal={kind:"objective",idx:parseInt(node.dataset.idx),isNew:false}; render(); return; }
  if(a==="add-obj"){ state.modal={kind:"objective",isNew:true}; render(); return; }
  if(a==="add-money"){ state.modal={kind:"addmoney",catId:node.dataset.cat,itemId:node.dataset.item}; render(); return; }

  // — Actions modales —
  if(a==="modal-cancel"){ state.modal=null; render(); return; }
  if(a==="modal-save"){ saveModal(); return; }
  if(a==="modal-delete"){ deleteModal(); return; }
  if(a==="do-archive"){ doArchive(); return; }
  if(a==="confirm-addmoney"){ var m=state.modal, cat=findCat(m.catId), it=findItem(cat,m.itemId); it.saved=(Number(it.saved)||0)+num("m-add"); save(); state.modal=null; showToast("✅ Épargne mise à jour"); return; }
});

//═══════════════════════════
render();
</script>
